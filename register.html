<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — SMART-FLIP 5.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F5F2E9;--ivory:#FFFDF8;--ivory2:#F0EDE6;
  --sage:#8FA287;--sage-d:#5A7353;
  --terra:#C8925A;--brown:#2C2420;--brown2:#4A3D33;--brown3:#7A6B5E;
  --line:#CFC8BB;--err:#B03020;
}
body{
  min-height:100vh;background:var(--cream);
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;
  padding:1.5rem 1rem;
}

/* ── CARD ── */
.card{
  display:flex;width:100%;max-width:820px;
  border-radius:20px;overflow:hidden;
  box-shadow:0 8px 40px rgba(44,36,32,.16);
}

/* ── LEFT PANEL ── */
.left{
  width:280px;flex-shrink:0;background:var(--brown);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2.5rem 2rem;gap:1.2rem;text-align:center;
}
.logo-mark{font-size:2.4rem;line-height:1}
.logo-text{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--terra);letter-spacing:-.5px}
.logo-text span{color:var(--sage)}
.logo-ver{font-size:.75rem;letter-spacing:.15em;font-weight:500;color:var(--terra);opacity:.8}
.left-divider{width:40px;height:1px;background:rgba(255,255,255,.12);margin:.4rem 0}
.logo-tagline{font-size:.72rem;color:rgba(155,139,122,.75);line-height:1.7}
.left-info{font-size:.7rem;color:rgba(155,139,122,.6);line-height:1.7}

/* ── RIGHT PANEL ── */
.right{
  flex:1;background:var(--ivory);
  display:flex;flex-direction:column;justify-content:center;
  padding:2.5rem 2.8rem;gap:1.4rem;
}
.form-header{display:flex;flex-direction:column;gap:.4rem}
.form-title{
  font-family:'Playfair Display',serif;font-size:1.75rem;
  color:var(--brown);font-weight:700;line-height:1.2;letter-spacing:-.3px;
}
.form-sub{font-size:.82rem;color:var(--brown3);font-weight:400;line-height:1.5}

/* ── ROLE TOGGLE ── */
.role-row{display:flex;gap:.6rem}
.role-btn{
  flex:1;height:44px;border-radius:9px;
  border:1.5px solid var(--line);background:transparent;
  font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;
  color:var(--brown2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.45rem;
  transition:all .2s;
}
.role-btn svg{width:16px;height:16px;flex-shrink:0;pointer-events:none}
.role-btn:hover{border-color:var(--brown);color:var(--brown);background:rgba(44,36,32,.04)}
.role-btn.active{background:var(--brown);border-color:var(--brown);color:var(--terra)}

/* ── FIELDS ── */
.fields{display:flex;flex-direction:column;gap:.85rem}
.field{display:flex;flex-direction:column;gap:.4rem}
.field label{font-size:.78rem;font-weight:600;color:var(--brown2);letter-spacing:.01em}
.field-wrap{
  position:relative;display:flex;align-items:center;
  height:46px;border-radius:10px;
  border:1.5px solid var(--line);background:var(--ivory2);
  padding:0 .9rem;gap:.5rem;
  transition:border-color .2s,box-shadow .2s;
}
.field-wrap:focus-within{border-color:var(--brown);box-shadow:0 0 0 3px rgba(44,36,32,.07)}
.field-wrap svg{flex-shrink:0;opacity:.5;width:16px;height:16px}
.field-wrap input{
  flex:1;border:none;background:transparent;
  font-family:'DM Sans',sans-serif;font-size:.9rem;
  color:var(--brown);font-weight:400;outline:none;
}
.field-wrap input::placeholder{color:var(--brown3);opacity:.8}

/* ── SUBMIT ── */
.btn-submit{
  width:100%;height:50px;background:var(--brown);border:none;border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;
  transition:background .2s,transform .1s,box-shadow .2s;
  box-shadow:0 4px 16px rgba(44,36,32,.25);
  letter-spacing:.01em;margin-top:1.4rem;
}
.btn-submit:hover{background:#1a120e;box-shadow:0 6px 20px rgba(44,36,32,.35)}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.btn-submit .spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
.btn-submit.loading .btn-text{display:none}
.btn-submit.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ALERT ── */
.alert{padding:.7rem 1rem;border-radius:8px;font-size:.8rem;display:none;line-height:1.5}
.alert.error{background:#FDF0EF;border:1px solid #EBB8B2;color:var(--err)}
.alert.success{background:#EAF3DE;border:1px solid #B8D98A;color:#2A5010}
.alert.show{display:block}

/* ── LOGIN LINK ── */
.login-row{text-align:center;font-size:.82rem;color:var(--brown3)}
.login-row a{color:var(--sage-d);text-decoration:none;font-weight:600}
.login-row a:hover{text-decoration:underline;color:var(--brown2)}

/* ── MOBILE ── */
@media(max-width:640px){
  .card{flex-direction:column}
  .left{
    width:100%;padding:1.6rem 2rem;
    flex-direction:row;flex-wrap:wrap;
    justify-content:center;gap:.8rem;
  }
  .logo-tagline,.left-divider,.left-info{display:none}
  .right{padding:2rem 1.6rem;gap:1.2rem}
  .form-title{font-size:1.5rem}
  .btn-submit{height:48px}
}
</style>
</head>
<body>
<div class="card">

  <!-- ── LEFT ── -->
  <div class="left">
    <div class="logo-mark">📖</div>
    <div>
      <div class="logo-text">SMART<span>-FLIP</span></div>
      <div class="logo-ver">5.0</div>
    </div>
    <div class="left-divider"></div>
    <div class="logo-tagline">E-Modul Adaptif<br>Metode Penelitian &<br>Pengembangan</div>
    <div class="left-divider"></div>
    <div class="left-info">Fakultas Vokasi<br>Universitas Negeri Malang<br>Dana Internal UM 2026</div>
  </div>

  <!-- ── RIGHT ── -->
  <div class="right">

    <div class="form-header">
      <div class="form-title">Buat Akun Baru</div>
      <div class="form-sub">Lengkapi data diri Anda untuk mendaftar</div>
    </div>

    <div class="role-row">
      <button class="role-btn active" data-role="mahasiswa" onclick="setRole('mahasiswa')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
        Mahasiswa
      </button>
      <button class="role-btn" data-role="dosen" onclick="setRole('dosen')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><path d="M19 8l2 2-2 2"/></svg>
        Dosen
      </button>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="regForm" onsubmit="handleRegister(event)">
      <div class="fields">
        <div class="field">
          <label>Nama Lengkap</label>
          <div class="field-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <input type="text" id="fullName" placeholder="Nama sesuai KTP" required>
          </div>
        </div>

        <div class="field">
          <label id="nimLabel">NIM</label>
          <div class="field-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg>
            <input type="text" id="nimNidn" placeholder="Nomor Induk Mahasiswa" required>
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <div class="field-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
            <input type="email" id="email" placeholder="nama@email.com" required autocomplete="email">
          </div>
        </div>

        <div class="field">
          <label>Kata Sandi</label>
          <div class="field-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="password" placeholder="Min. 8 karakter" required minlength="8">
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">Daftar Sekarang</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="login-row">Sudah punya akun? <a href="index.html">Masuk di sini</a></div>

  </div>
</div>

<script src="supabase.js"></script>
<script>
const DEMO_MODE = typeof sb === 'undefined';
let selectedRole = 'mahasiswa';

// Tampilkan info demo mode
if (DEMO_MODE) {
  document.querySelector('.form-sub').textContent = 'Pendaftaran belum tersedia di demo mode';
  document.getElementById('submitBtn').querySelector('.btn-text').textContent = 'Daftar (Demo)';
}

function setRole(r) {
  selectedRole = r;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.dataset.role === r));
  document.getElementById('nimLabel').textContent = r === 'dosen' ? 'NIDN' : 'NIM';
  document.getElementById('nimNidn').placeholder  = r === 'dosen' ? 'Nomor Induk Dosen Nasional' : 'Nomor Induk Mahasiswa';
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = `alert ${type} show`;
}

async function handleRegister(e) {
  e.preventDefault();

  // Demo mode: tidak bisa daftar, arahkan ke login
  if (DEMO_MODE) {
    showAlert('Pendaftaran memerlukan koneksi database. Gunakan tombol Demo di halaman Masuk.', 'error');
    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    return;
  }

  const btn      = document.getElementById('submitBtn');
  const fullName = document.getElementById('fullName').value.trim();
  const nimNidn  = document.getElementById('nimNidn').value.trim();
  const email    = document.getElementById('email').value.trim();
  const pw       = document.getElementById('password').value;

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const { data, error } = await sb.auth.signUp({
      email, password: pw,
      options: { data: { full_name: fullName, role: selectedRole, nim_nidn: nimNidn } }
    });
    if (error) throw error;

    if (data.user) {
      const { error: pErr } = await sb.from('profiles').upsert({
        id: data.user.id, full_name: fullName, nim_nidn: nimNidn, role: selectedRole
      });
      if (pErr) console.warn('Profile upsert:', pErr.message);
    }

    showAlert('Pendaftaran berhasil! Cek email untuk konfirmasi sebelum masuk.', 'success');
    document.getElementById('regForm').reset();

  } catch(err) {
    let msg = err.message || 'Terjadi kesalahan.';
    if (msg.includes('already registered'))        msg = 'Email ini sudah terdaftar. Silakan masuk.';
    if (msg.includes('Email signups are disabled')) msg = 'Pendaftaran email belum diaktifkan. Hubungi admin.';
    if (msg.includes('Password should be'))        msg = 'Kata sandi minimal 8 karakter.';
    showAlert(msg);
  }

  btn.classList.remove('loading');
  btn.disabled = false;
}
</script>
</body>
</html>
