<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #09090B;
  --surface:  #111115;
  --border:   rgba(255,255,255,0.07);
  --accent:   #6366F1;
  --accent2:  #818CF8;
  --txt:      #F4F4F5;
  --txt2:     #71717A;
  --txt3:     #3F3F46;
  --white:    #FFFFFF;
  --radius:   12px;
  --flip-ms:  600;
}

body {
  background: var(--bg);
  font-family: 'Outfit', system-ui, sans-serif;
  color: var(--txt);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ─── TOPBAR ─── */
.topbar {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(9,9,11,0.85);
  backdrop-filter: blur(16px);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.top-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--accent);
}
.brand-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--txt2);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.top-title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  font-weight: 500;
  color: var(--txt);
  max-width: 420px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0;
  transition: opacity 0.4s;
}
.top-title.visible { opacity: 1; }

.top-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.top-badge {
  font-size: 12px;
  color: var(--txt2);
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.4s;
}
.top-badge.visible { opacity: 1; }

/* ─── MAIN STAGE ─── */
.stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ambient glow behind book */
.stage::before {
  content: '';
  position: absolute;
  width: 70%;
  height: 60%;
  background: radial-gradient(ellipse, rgba(99,102,241,0.08) 0%, transparent 70%);
  pointer-events: none;
  border-radius: 50%;
}

/* ─── BOOK ─── */
.book-wrap {
  perspective: 4000px;
  position: relative;
}

.book {
  display: flex;
  position: relative;
  width:  min(82vw, 860px);
  height: min(55vw, 580px);
  border-radius: 2px 6px 6px 2px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 40px 80px rgba(0,0,0,0.7),
    0 20px 40px rgba(0,0,0,0.4),
    0 60px 120px rgba(0,0,0,0.3);
  transform: rotateX(2deg);
  transform-style: preserve-3d;
}

/* pages */
.pg {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #FAFAF8;
}
.pg.pg-l {
  border-radius: 2px 0 0 2px;
  box-shadow: inset -12px 0 28px rgba(0,0,0,0.12);
}
.pg.pg-r {
  border-radius: 0 2px 2px 0;
  box-shadow: inset 12px 0 28px rgba(0,0,0,0.12);
}
.pg img, .pg canvas {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}
.pg-blank {
  width: 100%; height: 100%;
  background: linear-gradient(160deg, #F8F8F6 0%, #F0F0EC 100%);
}

/* spine */
.spine {
  width: 24px;
  flex-shrink: 0;
  background: linear-gradient(to right,
    #1A1A1A 0%,
    #2E2E2E 20%,
    #3A3A3A 50%,
    #2E2E2E 80%,
    #1A1A1A 100%);
  position: relative;
  z-index: 5;
  box-shadow:
    2px 0 8px rgba(0,0,0,0.4),
    -2px 0 8px rgba(0,0,0,0.4);
}
.spine::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom,
    transparent, rgba(99,102,241,0.12) 30%,
    transparent 60%, rgba(99,102,241,0.08) 80%,
    transparent);
}

/* ─── FLIPPER ─── */
.flipper {
  display: none;
  position: absolute;
  top: 0; bottom: 0;
  transform-style: preserve-3d;
  z-index: 20;
}
.f-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
  background: #FAFAF8;
}
.f-back { transform: rotateY(180deg); }
.f-face img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}
/* Edge gradient for page depth */
.f-face::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.f-front::after {
  background: linear-gradient(to left, rgba(0,0,0,0.15) 0%, transparent 15%);
}
.f-back::after {
  background: linear-gradient(to right, rgba(0,0,0,0.15) 0%, transparent 15%);
}

/* ─── LOADING OVERLAY ─── */
#loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  z-index: 100;
  transition: opacity 0.5s;
}
#loader.fade-out { opacity: 0; pointer-events: none; }

.loader-icon {
  position: relative;
  width: 52px; height: 52px;
}
.loader-ring {
  position: absolute; inset: 0;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-inner {
  position: absolute;
  inset: 8px;
  border: 1.5px solid var(--border);
  border-bottom-color: var(--accent2);
  border-radius: 50%;
  animation: spin 1.2s linear infinite reverse;
}

.loader-text {
  font-size: 14px;
  font-weight: 400;
  color: var(--txt2);
}

.loader-bar-wrap {
  width: 240px;
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.loader-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(to right, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.35s ease;
}

.loader-detail {
  font-size: 12px;
  color: var(--txt3);
}

/* ─── BOTTOM TOOLBAR ─── */
.toolbar {
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  flex-shrink: 0;
  padding: 0 24px;
  opacity: 0;
  transition: opacity 0.4s;
  position: relative;
  z-index: 10;
}
.toolbar.visible { opacity: 1; }

.tb-inner {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 8px;
  backdrop-filter: blur(16px);
}

.btn-nav {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: transparent;
  border: none;
  color: var(--txt2);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
}
.btn-nav:hover:not(:disabled) {
  background: rgba(99,102,241,0.15);
  color: var(--accent2);
}
.btn-nav:disabled { opacity: 0.25; cursor: not-allowed; }

.tb-divider {
  width: 1px; height: 20px;
  background: var(--border);
  margin: 0 6px;
}

.pg-counter {
  font-size: 13px;
  font-weight: 400;
  color: var(--txt2);
  min-width: 90px;
  text-align: center;
  letter-spacing: 0.02em;
  padding: 0 4px;
}
.pg-counter span {
  color: var(--txt);
  font-weight: 500;
}

/* ─── THUMBNAIL ROW ─── */
.thumbrow {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 0 24px 70px;
  pointer-events: none;
  z-index: 9;
}
.thumbrow.show {
  display: flex;
}
.thumblist {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  max-width: 860px;
  padding: 10px 12px;
  background: rgba(9,9,11,0.9);
  border: 1px solid var(--border);
  border-radius: 12px;
  backdrop-filter: blur(20px);
  pointer-events: all;
  scrollbar-width: none;
}
.thumblist::-webkit-scrollbar { display: none; }

.thumb {
  flex-shrink: 0;
  width: 46px; height: 62px;
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: border-color 0.2s, transform 0.2s;
  background: #222;
}
.thumb:hover { transform: translateY(-3px); }
.thumb.active { border-color: var(--accent); }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* thumbnail toggle button */
.btn-thumb {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: transparent;
  border: none;
  color: var(--txt2);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
}
.btn-thumb:hover {
  background: rgba(255,255,255,0.06);
  color: var(--txt);
}
.btn-thumb.active { color: var(--accent2); }

/* ─── ERROR ─── */
.error-msg {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  text-align: center;
}
.error-msg.show { display: flex; }
.error-icon { font-size: 2.5rem; }
.error-title { font-size: 16px; font-weight: 500; color: var(--txt); }
.error-sub { font-size: 13px; color: var(--txt2); max-width: 320px; line-height: 1.6; }
.error-code {
  font-size: 11px; color: var(--txt3);
  font-family: monospace;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 6px;
  max-width: 380px; word-break: break-all;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 640px) {
  .topbar { padding: 0 16px; }
  .top-title { max-width: 180px; font-size: 12px; }
  .spine { width: 14px; }
}

/* keyboard hint */
.hint {
  position: fixed;
  bottom: 72px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: var(--txt3);
  letter-spacing: 0.04em;
  opacity: 0;
  animation: hintfade 3s 2s forwards;
  pointer-events: none;
  white-space: nowrap;
}
@keyframes hintfade {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<!-- ─── LOADING ─── -->
<div id="loader">
  <div class="loader-icon">
    <div class="loader-ring"></div>
    <div class="loader-inner"></div>
  </div>
  <div class="loader-text" id="ldText">Memuat dokumen…</div>
  <div class="loader-bar-wrap">
    <div class="loader-bar" id="ldBar"></div>
  </div>
  <div class="loader-detail" id="ldDetail">Membaca konfigurasi</div>

  <!-- Error state inside loader -->
  <div class="error-msg" id="errMsg">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Gagal memuat dokumen</div>
    <div class="error-sub">Pastikan file PDF dan config.json ada di folder yang sama dengan index.html, lalu buka melalui server lokal (bukan klik langsung).</div>
    <div class="error-code" id="errCode"></div>
  </div>
</div>

<!-- ─── TOPBAR ─── -->
<header class="topbar">
  <div class="top-brand">
    <div class="brand-dot"></div>
    <div class="brand-name" id="brandName">Perpustakaan Digital</div>
  </div>
  <div class="top-title" id="topTitle"></div>
  <div class="top-right">
    <div class="top-badge" id="topBadge">— / —</div>
  </div>
</header>

<!-- ─── STAGE ─── -->
<div class="stage">
  <div class="book-wrap">
    <div class="book" id="book">
      <div class="pg pg-l" id="pgL"><div class="pg-blank"></div></div>
      <div class="spine"></div>
      <div class="pg pg-r" id="pgR"><div class="pg-blank"></div></div>
      <div class="flipper" id="flipper">
        <div class="f-face f-front" id="fFront"></div>
        <div class="f-face f-back"  id="fBack"></div>
      </div>
    </div>
  </div>
</div>

<!-- ─── BOTTOM TOOLBAR ─── -->
<div class="toolbar" id="toolbar">
  <div class="tb-inner">
    <button class="btn-nav"  id="btnFirst" title="Halaman pertama">⏮</button>
    <button class="btn-nav"  id="btnPrev"  title="Sebelumnya (←)">‹</button>
    <div class="tb-divider"></div>
    <div class="pg-counter" id="pgCounter"><span>—</span> / —</div>
    <div class="tb-divider"></div>
    <button class="btn-nav"  id="btnNext"  title="Berikutnya (→)">›</button>
    <button class="btn-nav"  id="btnLast"  title="Halaman terakhir">⏭</button>
    <div class="tb-divider"></div>
    <button class="btn-thumb" id="btnThumb" title="Thumbnail">⊞</button>
  </div>
</div>

<!-- ─── THUMBNAILS ─── -->
<div class="thumbrow" id="thumbRow">
  <div class="thumblist" id="thumbList"></div>
</div>

<div class="hint" id="hint">← → untuk berpindah halaman &nbsp;·&nbsp; Klik buku untuk membalik</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
let pages   = [];
let cur     = 0;   // left-page index (always even)
let total   = 0;
let busy    = false;
let thumbOpen = false;
const FLIP  = 580; // ms

// ── DOM ──
const loader    = document.getElementById('loader');
const ldText    = document.getElementById('ldText');
const ldBar     = document.getElementById('ldBar');
const ldDetail  = document.getElementById('ldDetail');
const errMsg    = document.getElementById('errMsg');
const errCode   = document.getElementById('errCode');
const topTitle  = document.getElementById('topTitle');
const topBadge  = document.getElementById('topBadge');
const brandName = document.getElementById('brandName');
const toolbar   = document.getElementById('toolbar');
const pgL       = document.getElementById('pgL');
const pgR       = document.getElementById('pgR');
const pgCounter = document.getElementById('pgCounter');
const btnFirst  = document.getElementById('btnFirst');
const btnPrev   = document.getElementById('btnPrev');
const btnNext   = document.getElementById('btnNext');
const btnLast   = document.getElementById('btnLast');
const btnThumb  = document.getElementById('btnThumb');
const thumbRow  = document.getElementById('thumbRow');
const thumbList = document.getElementById('thumbList');
const flipper   = document.getElementById('flipper');
const fFront    = document.getElementById('fFront');
const fBack     = document.getElementById('fBack');
const book      = document.getElementById('book');

// ── BOOT ──
async function boot() {
  try {
    // 1. Load config
    setProgress(5, 'Membaca config.json…');
    const cfg = await fetchJSON('config.json');
    if (cfg.subtitle) brandName.textContent = cfg.subtitle;

    // 2. Load PDF
    setProgress(12, `Membuka ${cfg.pdf}…`);
    topTitle.textContent = cfg.title || cfg.pdf;

    const pdfRes = await fetch(cfg.pdf);
    if (!pdfRes.ok) throw new Error(`HTTP ${pdfRes.status}: ${cfg.pdf}`);
    const pdfBuf = await pdfRes.arrayBuffer();

    setProgress(20, 'Memuat PDF…');
    const pdf = await pdfjsLib.getDocument({ data: pdfBuf }).promise;
    const n   = pdf.numPages;
    const scale = cfg.renderScale || 1.8;

    pages = [];
    for (let i = 1; i <= n; i++) {
      const page = await pdf.getPage(i);
      const vp   = page.getViewport({ scale });
      const c    = document.createElement('canvas');
      c.width = vp.width; c.height = vp.height;
      await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
      pages.push(c.toDataURL('image/jpeg', 0.90));
      setProgress(20 + Math.round((i / n) * 75), `Merender halaman ${i} dari ${n}…`);
    }

    total = pages.length;
    cur   = (cfg.startPage || 0);
    // align to even
    if (cur % 2 !== 0) cur = Math.max(0, cur - 1);
    if (cur >= total) cur = Math.floor((total - 1) / 2) * 2;

    setProgress(100, 'Selesai!');
    buildThumbs();

    // Hide loader
    setTimeout(() => {
      loader.classList.add('fade-out');
      setTimeout(() => { loader.style.display = 'none'; }, 500);
      topTitle.classList.add('visible');
      topBadge.classList.add('visible');
      toolbar.classList.add('visible');
      renderSpread();
    }, 400);

  } catch (err) {
    console.error(err);
    showError(err.message);
  }
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Cannot load ${url} (HTTP ${r.status})`);
  return r.json();
}

function setProgress(pct, msg) {
  ldBar.style.width  = pct + '%';
  ldDetail.textContent = msg;
}

function showError(msg) {
  ldText.style.display = 'none';
  ldBar.parentElement.style.display = 'none';
  ldDetail.style.display = 'none';
  errCode.textContent = msg;
  errMsg.classList.add('show');
}

// ── RENDER SPREAD ──
function img(src) {
  const el = document.createElement('img');
  el.src = src; el.alt = '';
  return el;
}

function setPage(el, idx) {
  el.innerHTML = '';
  if (idx >= 0 && idx < pages.length) {
    el.appendChild(img(pages[idx]));
  } else {
    const b = document.createElement('div');
    b.className = 'pg-blank';
    el.appendChild(b);
  }
}

function renderSpread() {
  setPage(pgL, cur);
  setPage(pgR, cur + 1);

  const lNum = cur + 1;
  const rNum = cur + 1 < total ? cur + 2 : null;
  pgCounter.innerHTML = rNum
    ? `<span>${lNum} – ${rNum}</span> / ${total}`
    : `<span>${lNum}</span> / ${total}`;
  topBadge.textContent = rNum
    ? `${lNum} – ${rNum} / ${total}`
    : `${lNum} / ${total}`;

  btnFirst.disabled = cur <= 0;
  btnPrev.disabled  = cur <= 0;
  btnNext.disabled  = cur + 2 >= total;
  btnLast.disabled  = cur + 2 >= total;

  syncThumbs();
}

// ── FLIP ──
function flip(dir) {
  // dir = +1 forward, -1 backward
  if (busy) return;
  if (dir > 0 && cur + 2 >= total) return;
  if (dir < 0 && cur <= 0) return;
  busy = true;

  const bookW  = book.clientWidth;
  const pgW    = (bookW - 24) / 2;

  if (dir > 0) {
    // Right page flips left → reveals next left
    fFront.innerHTML = pages[cur + 1]
      ? `<img src="${pages[cur+1]}">` : '<div class="pg-blank"></div>';
    fBack.innerHTML  = (cur + 2 < pages.length)
      ? `<img src="${pages[cur+2]}">` : '<div class="pg-blank"></div>';

    Object.assign(flipper.style, {
      display: 'block', right: '0', left: 'auto',
      width: pgW + 'px', transformOrigin: 'left center',
      transform: 'rotateY(0deg)', transition: 'none'
    });
  } else {
    // Left page flips right → reveals prev right
    fFront.innerHTML = pages[cur]
      ? `<img src="${pages[cur]}">` : '<div class="pg-blank"></div>';
    fBack.innerHTML  = (cur - 1 >= 0)
      ? `<img src="${pages[cur-1]}">` : '<div class="pg-blank"></div>';

    Object.assign(flipper.style, {
      display: 'block', left: '0', right: 'auto',
      width: pgW + 'px', transformOrigin: 'right center',
      transform: 'rotateY(0deg)', transition: 'none'
    });
  }

  requestAnimationFrame(() => requestAnimationFrame(() => {
    flipper.style.transition = `transform ${FLIP}ms cubic-bezier(0.4, 0, 0.2, 1)`;
    flipper.style.transform  = dir > 0 ? 'rotateY(-180deg)' : 'rotateY(180deg)';
  }));

  setTimeout(() => {
    cur += dir * 2;
    renderSpread();
    Object.assign(flipper.style, {
      display: 'none', transition: 'none',
      left: 'auto', right: '0'
    });
    busy = false;
  }, FLIP + 40);
}

function jumpTo(targetPage) {
  // targetPage is 0-indexed page number, align to even spread start
  let s = Math.floor(targetPage / 2) * 2;
  s = Math.max(0, Math.min(s, total % 2 === 0 ? total - 2 : total - 1));
  if (s === cur) return;
  cur = s;
  renderSpread();
}

// ── THUMBNAILS ──
function buildThumbs() {
  thumbList.innerHTML = '';
  pages.forEach((src, i) => {
    const d = document.createElement('div');
    d.className = 'thumb';
    d.innerHTML = `<img src="${src}" loading="lazy" alt="${i+1}">`;
    d.addEventListener('click', () => jumpTo(i));
    thumbList.appendChild(d);
  });
}
function syncThumbs() {
  Array.from(thumbList.children).forEach((t, i) => {
    t.classList.toggle('active', i === cur || i === cur + 1);
  });
  const active = thumbList.children[cur];
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ── EVENTS ──
btnNext.addEventListener('click', () => flip(+1));
btnPrev.addEventListener('click', () => flip(-1));
btnFirst.addEventListener('click', () => jumpTo(0));
btnLast.addEventListener('click',  () => jumpTo(total - 1));

btnThumb.addEventListener('click', () => {
  thumbOpen = !thumbOpen;
  thumbRow.classList.toggle('show', thumbOpen);
  btnThumb.classList.toggle('active', thumbOpen);
});

// Click on left/right half of book to flip
book.addEventListener('click', e => {
  const rect = book.getBoundingClientRect();
  const x    = e.clientX - rect.left;
  if (x < rect.width / 2) flip(-1);
  else flip(+1);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ')  { e.preventDefault(); flip(+1); }
  if (e.key === 'ArrowLeft')                     { e.preventDefault(); flip(-1); }
  if (e.key === 'Home')                           jumpTo(0);
  if (e.key === 'End')                            jumpTo(total - 1);
  if (e.key === 'Escape' && thumbOpen)           { thumbOpen = false; thumbRow.classList.remove('show'); btnThumb.classList.remove('active'); }
});

// Swipe
let tx = 0;
book.addEventListener('touchstart', e => { tx = e.changedTouches[0].clientX; }, { passive: true });
book.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 44) flip(dx < 0 ? +1 : -1);
});

// ── START ──
boot();
</script>
</body>
</html>
