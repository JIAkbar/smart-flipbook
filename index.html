<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perpustakaan Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #09090B;
  --surface:  #18181B;
  --surface2: #27272A;
  --border:   rgba(255,255,255,0.07);
  --accent:   #6366F1;
  --accent2:  #818CF8;
  --txt:      #FAFAFA;
  --txt2:     #A1A1AA;
  --txt3:     #52525B;
  --r:        10px;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  font-family: 'Outfit', system-ui, sans-serif;
  color: var(--txt);
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ─── TOPBAR ─── */
.topbar {
  height: 52px; flex-shrink: 0;
  display: flex; align-items: center; padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(9,9,11,0.9);
  backdrop-filter: blur(20px);
  z-index: 50; position: relative;
  gap: 12px;
}
.top-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); flex-shrink:0; }
.top-brand { font-size: 13px; font-weight: 500; color: var(--txt2); letter-spacing: .05em; text-transform: uppercase; }
.top-sep { flex: 1; }
.top-title { font-size: 13px; font-weight: 500; color: var(--txt); opacity: 0; transition: opacity .3s; }
.top-title.show { opacity: 1; }
.btn-back {
  display: none; align-items: center; gap: 6px;
  font-size: 12px; color: var(--txt2); background: none;
  border: 1px solid var(--border); padding: 5px 12px; border-radius: 20px;
  cursor: pointer; transition: all .2s; font-family: inherit;
}
.btn-back:hover { color: var(--txt); border-color: var(--accent2); }
.btn-back.show { display: flex; }

/* ─── MAIN ─── */
.main { flex: 1; overflow: hidden; position: relative; }

/* ═══════════════════════════════
   CATALOG SCREEN
═══════════════════════════════ */
#catalog {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  padding: 32px 32px 24px;
  overflow-y: auto;
  transition: opacity .4s, transform .4s;
}
#catalog.hide { opacity: 0; transform: scale(.97); pointer-events: none; }

.cat-header { margin-bottom: 32px; }
.cat-title { font-size: 26px; font-weight: 700; line-height: 1.2; }
.cat-title span { color: var(--accent2); }
.cat-sub { font-size: 13px; color: var(--txt3); margin-top: 6px; }

/* Loading / Error states */
.state-box {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 16px; flex: 1;
  text-align: center;
}
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-msg { font-size: 14px; color: var(--txt2); }
.state-hint { font-size: 12px; color: var(--txt3); max-width: 340px; line-height: 1.6; }
.err-icon { font-size: 2rem; }

/* Book grid */
.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 24px;
}

.book-card {
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer;
  transition: transform .25s;
}
.book-card:hover { transform: translateY(-4px); }
.book-card:hover .card-cover { box-shadow: 0 20px 50px rgba(0,0,0,.7), 0 0 0 1px rgba(99,102,241,.3); }

.card-cover {
  position: relative;
  aspect-ratio: 2/3;
  border-radius: 3px 8px 8px 3px;
  overflow: hidden;
  background: var(--surface);
  box-shadow: 0 10px 30px rgba(0,0,0,.5), -4px 0 0 rgba(0,0,0,.4);
  transition: box-shadow .25s;
}
.card-cover canvas, .card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-cover .cover-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
}
.card-cover .cover-loading .spinner { width: 24px; height: 24px; }

/* Spine effect */
.card-cover::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 12px;
  background: linear-gradient(to right, rgba(0,0,0,.5) 0%, rgba(0,0,0,.1) 60%, transparent 100%);
  z-index: 1;
}

.card-info { padding: 0 2px; }
.card-name { font-size: 13px; font-weight: 500; color: var(--txt); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-pages { font-size: 11px; color: var(--txt3); margin-top: 3px; }

/* ═══════════════════════════════
   READER SCREEN
═══════════════════════════════ */
#reader {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  opacity: 0; pointer-events: none;
  transition: opacity .4s;
}
#reader.show { opacity: 1; pointer-events: all; }

/* loading overlay inside reader */
#readerLoader {
  position: absolute; inset: 0; z-index: 30;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px;
  transition: opacity .4s;
}
#readerLoader.hide { opacity: 0; pointer-events: none; }

.rl-spinner { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--border); border-top-color: var(--accent); animation: spin .75s linear infinite; }
.rl-text { font-size: 14px; color: var(--txt2); }
.rl-bar { width: 220px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.rl-fill { height: 100%; width: 0%; background: linear-gradient(to right, var(--accent), var(--accent2)); transition: width .3s ease; border-radius: 2px; }
.rl-detail { font-size: 11px; color: var(--txt3); }

/* Stage */
.stage {
  flex: 1; width: 100%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
}
.stage::before {
  content: ''; position: absolute;
  width: 60%; height: 50%;
  background: radial-gradient(ellipse, rgba(99,102,241,.07), transparent 70%);
  border-radius: 50%; pointer-events: none;
}

/* Book */
.book-wrap { perspective: 4000px; position: relative; }
.book {
  display: flex; position: relative;
  width: min(84vw, 860px); height: min(56vw, 574px);
  border-radius: 2px 6px 6px 2px;
  box-shadow: 0 0 0 1px rgba(255,255,255,.04), 0 40px 80px rgba(0,0,0,.75), 0 20px 40px rgba(0,0,0,.4);
  transform: rotateX(1.5deg); transform-style: preserve-3d;
}
.pg { flex: 1; position: relative; overflow: hidden; background: #F9F9F7; }
.pg.pg-l { border-radius: 2px 0 0 2px; box-shadow: inset -10px 0 24px rgba(0,0,0,.1); }
.pg.pg-r { border-radius: 0 2px 2px 0; box-shadow: inset 10px 0 24px rgba(0,0,0,.1); }
.pg img, .pg canvas { width: 100%; height: 100%; object-fit: contain; display: block; }
.pg-blank { width: 100%; height: 100%; background: linear-gradient(155deg, #F8F8F6, #EFEFEC); }
.spine {
  width: 22px; flex-shrink: 0; z-index: 5;
  background: linear-gradient(to right, #111 0%, #2A2A2A 20%, #333 50%, #2A2A2A 80%, #111 100%);
  box-shadow: 2px 0 8px rgba(0,0,0,.4), -2px 0 8px rgba(0,0,0,.4);
  position: relative;
}
.spine::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(99,102,241,.12) 35%, transparent 65%, rgba(99,102,241,.07) 85%, transparent); }

/* Flipper */
.flipper { display: none; position: absolute; top:0; bottom:0; transform-style: preserve-3d; z-index: 20; }
.f-face { position: absolute; inset:0; backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden; background: #F9F9F7; }
.f-back { transform: rotateY(180deg); }
.f-face img { width:100%; height:100%; object-fit:contain; display:block; }
.f-front::after { content:''; position:absolute; inset:0; background: linear-gradient(to left, rgba(0,0,0,.18) 0%, transparent 18%); pointer-events:none; }
.f-back::after  { content:''; position:absolute; inset:0; background: linear-gradient(to right, rgba(0,0,0,.18) 0%, transparent 18%); pointer-events:none; }

/* Toolbar */
.toolbar {
  height: 56px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.tb {
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,.04); border: 1px solid var(--border);
  border-radius: 40px; padding: 6px 8px; backdrop-filter: blur(16px);
}
.btn-n {
  width: 34px; height: 34px; border-radius: 50%; background: none; border: none;
  color: var(--txt2); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, color .2s; font-family: inherit;
}
.btn-n:hover:not(:disabled) { background: rgba(99,102,241,.15); color: var(--accent2); }
.btn-n:disabled { opacity: .22; cursor: not-allowed; }
.tb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
.pg-counter { font-size: 12px; color: var(--txt2); min-width: 80px; text-align: center; }
.pg-counter b { color: var(--txt); font-weight: 500; }

/* Thumbnails */
#thumbRow {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: none; justify-content: center; padding: 0 16px 58px;
  pointer-events: none; z-index: 40;
}
#thumbRow.show { display: flex; }
.thumblist {
  display: flex; gap: 5px; overflow-x: auto; max-width: 860px;
  padding: 10px 12px; background: rgba(9,9,11,.92);
  border: 1px solid var(--border); border-radius: 10px;
  backdrop-filter: blur(20px); pointer-events: all;
  scrollbar-width: none;
}
.thumblist::-webkit-scrollbar { display: none; }
.thumb {
  flex-shrink: 0; width: 44px; height: 60px; border-radius: 3px;
  overflow: hidden; cursor: pointer;
  border: 1.5px solid transparent; transition: border-color .2s, transform .2s;
  background: var(--surface);
}
.thumb:hover { transform: translateY(-3px); }
.thumb.active { border-color: var(--accent); }
.thumb img { width:100%; height:100%; object-fit:cover; display:block; }

@media (max-width: 600px) {
  .topbar { padding: 0 14px; }
  .cat-title { font-size: 20px; }
  #catalog { padding: 20px 16px; }
  .book-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; }
  .spine { width: 14px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="top-dot"></div>
  <div class="top-brand" id="topBrand">Perpustakaan Digital</div>
  <div class="top-sep"></div>
  <div class="top-title" id="topTitle"></div>
  <button class="btn-back" id="btnBack">← Katalog</button>
</header>

<div class="main">

  <!-- ══ CATALOG ══ -->
  <div id="catalog">
    <div class="cat-header">
      <div class="cat-title">Koleksi <span>Buku</span></div>
      <div class="cat-sub" id="catSub">Memuat koleksi…</div>
    </div>

    <!-- State: loading -->
    <div class="state-box" id="stateLoading">
      <div class="spinner"></div>
      <div class="state-msg">Mendeteksi koleksi buku…</div>
    </div>

    <!-- State: error -->
    <div class="state-box" id="stateError" style="display:none">
      <div class="err-icon">📭</div>
      <div class="state-msg">Tidak ada buku ditemukan</div>
      <div class="state-hint" id="stateHint">Taruh file PDF di folder <code>books/</code> di dalam repo GitHub Anda, lalu push ulang.</div>
    </div>

    <!-- Book grid -->
    <div class="book-grid" id="bookGrid" style="display:none"></div>
  </div>

  <!-- ══ READER ══ -->
  <div id="reader">

    <!-- Reader loader -->
    <div id="readerLoader">
      <div class="rl-spinner"></div>
      <div class="rl-text">Membuka buku…</div>
      <div class="rl-bar"><div class="rl-fill" id="rlFill"></div></div>
      <div class="rl-detail" id="rlDetail">Memuat PDF…</div>
    </div>

    <div class="stage">
      <div class="book-wrap">
        <div class="book" id="book">
          <div class="pg pg-l" id="pgL"><div class="pg-blank"></div></div>
          <div class="spine"></div>
          <div class="pg pg-r" id="pgR"><div class="pg-blank"></div></div>
          <div class="flipper" id="flipper">
            <div class="f-face f-front" id="fFront"></div>
            <div class="f-face f-back"  id="fBack"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="tb">
        <button class="btn-n" id="btnFirst" title="Awal">⏮</button>
        <button class="btn-n" id="btnPrev"  title="Sebelumnya (←)">‹</button>
        <div class="tb-sep"></div>
        <div class="pg-counter" id="pgCounter"><b>—</b> / —</div>
        <div class="tb-sep"></div>
        <button class="btn-n" id="btnNext"  title="Berikutnya (→)">›</button>
        <button class="btn-n" id="btnLast"  title="Akhir">⏭</button>
        <div class="tb-sep"></div>
        <button class="btn-n" id="btnThumb" title="Thumbnail">⊞</button>
      </div>
    </div>
  </div>

</div>

<!-- Thumbnails -->
<div id="thumbRow">
  <div class="thumblist" id="thumbList"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── REPO DETECTION ───
function detectRepo() {
  const host = window.location.hostname;
  const path = window.location.pathname;
  if (host.endsWith('.github.io')) {
    const owner = host.split('.')[0];
    const repo  = path.split('/').filter(Boolean)[0] || '';
    return { owner, repo };
  }
  // local dev fallback — point at hardcoded repo
  return { owner: 'JIAkbar', repo: 'Flipbook' };
}

// ─── STATE ───
let pages      = [];   // rendered image data-URLs
let cur        = 0;    // left-page index
let total      = 0;
let busy       = false;
let thumbOpen  = false;
const FLIP     = 560;

// ─── DOM ───
const $ = id => document.getElementById(id);
const catalog      = $('catalog');
const reader       = $('reader');
const readerLoader = $('readerLoader');
const stateLoading = $('stateLoading');
const stateError   = $('stateError');
const stateHint    = $('stateHint');
const bookGrid     = $('bookGrid');
const catSub       = $('catSub');
const topTitle     = $('topTitle');
const topBrand     = $('topBrand');
const btnBack      = $('btnBack');
const pgL          = $('pgL');
const pgR          = $('pgR');
const pgCounter    = $('pgCounter');
const rlFill       = $('rlFill');
const rlDetail     = $('rlDetail');
const btnFirst     = $('btnFirst');
const btnPrev      = $('btnPrev');
const btnNext      = $('btnNext');
const btnLast      = $('btnLast');
const btnThumb     = $('btnThumb');
const thumbRow     = $('thumbRow');
const thumbList    = $('thumbList');
const flipper      = $('flipper');
const fFront       = $('fFront');
const fBack        = $('fBack');
const book         = $('book');

// ─── BOOT ───
async function boot() {
  // Load config for subtitle
  try {
    const cfg = await fetch('config.json').then(r => r.json()).catch(() => ({}));
    if (cfg.subtitle) topBrand.textContent = cfg.subtitle;
    document.title = cfg.subtitle || 'Perpustakaan Digital';

    const folder = cfg.booksFolder || 'books';
    await loadCatalog(folder);
  } catch (e) {
    showCatalogError('Gagal memuat konfigurasi: ' + e.message);
  }
}

// ─── CATALOG ───
async function loadCatalog(folder) {
  const { owner, repo } = detectRepo();
  const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${folder}`;

  try {
    const res   = await fetch(apiUrl);
    if (!res.ok) throw new Error(`GitHub API: HTTP ${res.status}`);
    const files = await res.json();
    const pdfs  = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));

    if (!pdfs.length) {
      showCatalogError(`Tidak ada PDF di folder "${folder}". Upload PDF ke sana lalu refresh.`);
      return;
    }

    catSub.textContent = `${pdfs.length} buku ditemukan`;
    stateLoading.style.display = 'none';
    bookGrid.style.display = 'grid';

    for (const pdf of pdfs) {
      const relPath = `${folder}/${pdf.name}`;
      addBookCard(pdf.name, relPath);
    }

  } catch (e) {
    // Fallback: try local books/ folder via fetch (for local dev)
    try {
      await tryLocalFallback(folder);
    } catch {
      showCatalogError(`Tidak dapat mendeteksi buku otomatis.\n${e.message}\n\nPastikan repo GitHub bersifat Public dan folder "${folder}" ada.`);
    }
  }
}

async function tryLocalFallback(folder) {
  // Try to read a manifest or known filenames from config
  const cfg = await fetch('config.json').then(r => r.json()).catch(() => ({}));
  if (!cfg.pdfs || !cfg.pdfs.length) throw new Error('no pdfs in config');
  stateLoading.style.display = 'none';
  bookGrid.style.display = 'grid';
  catSub.textContent = `${cfg.pdfs.length} buku`;
  for (const name of cfg.pdfs) {
    addBookCard(name, `${folder}/${name}`);
  }
}

function showCatalogError(msg) {
  stateLoading.style.display = 'none';
  stateError.style.display   = 'flex';
  stateHint.textContent = msg;
}

function addBookCard(filename, relPath) {
  const title = filename.replace(/\.pdf$/i, '').replace(/[-_]/g, ' ');

  const card = document.createElement('div');
  card.className = 'book-card';
  card.innerHTML = `
    <div class="card-cover">
      <div class="cover-loading"><div class="spinner"></div></div>
    </div>
    <div class="card-info">
      <div class="card-name">${title}</div>
      <div class="card-pages">— halaman</div>
    </div>`;

  const coverEl = card.querySelector('.card-cover');
  const pagesEl = card.querySelector('.card-pages');

  // Render cover asynchronously
  renderCover(relPath, coverEl, pagesEl);

  card.addEventListener('click', () => openBook(relPath, title));
  bookGrid.appendChild(card);
}

async function renderCover(relPath, coverEl, pagesEl) {
  try {
    const buf = await fetch(relPath).then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.arrayBuffer();
    });
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    pagesEl.textContent = `${pdf.numPages} halaman`;

    const page = await pdf.getPage(1);
    const vp   = page.getViewport({ scale: 1.2 });
    const c    = document.createElement('canvas');
    c.width = vp.width; c.height = vp.height;
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;

    coverEl.innerHTML = '';
    coverEl.appendChild(c);

    // Cache buffer for reader
    coverEl._pdfBuf = buf;
    coverEl._pdf    = pdf;
  } catch (e) {
    coverEl.innerHTML = `<div class="pg-blank" style="display:flex;align-items:center;justify-content:center;color:#52525B;font-size:11px;text-align:center;padding:8px">Gagal memuat cover</div>`;
  }
}

// ─── OPEN BOOK ───
async function openBook(relPath, title) {
  // Switch screens
  catalog.classList.add('hide');
  reader.classList.add('show');
  readerLoader.classList.remove('hide');
  topTitle.textContent = title;
  topTitle.classList.add('show');
  btnBack.classList.add('show');
  document.title = title;

  setRL(5, 'Mengambil PDF…');
  pages = [];

  try {
    // Try to reuse already-fetched buffer from cover card
    let pdf = findCachedPDF(relPath);

    if (!pdf) {
      const buf = await fetch(relPath).then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}: ${relPath}`);
        return r.arrayBuffer();
      });
      setRL(20, 'Membuka PDF…');
      pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    } else {
      setRL(20, 'Menggunakan cache…');
    }

    const n = pdf.numPages;
    // Prepend blank so cover appears on right side
    pages = [null];

    for (let i = 1; i <= n; i++) {
      const page = await pdf.getPage(i);
      const vp   = page.getViewport({ scale: 1.8 });
      const c    = document.createElement('canvas');
      c.width = vp.width; c.height = vp.height;
      await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
      pages.push(c.toDataURL('image/jpeg', 0.88));
      setRL(20 + Math.round((i / n) * 75), `Halaman ${i} dari ${n}…`);
    }

    total = pages.length; // includes blank at [0]
    cur   = 0;
    buildThumbs();
    readerLoader.classList.add('hide');
    renderSpread();

  } catch (e) {
    readerLoader.querySelector('.rl-text').textContent = '⚠ Gagal membuka: ' + e.message;
  }
}

function findCachedPDF(relPath) {
  const cards = bookGrid.querySelectorAll('.book-card');
  for (const card of cards) {
    const cover = card.querySelector('.card-cover');
    // match by path — store relPath on card
    if (card.dataset.path === relPath && cover._pdf) return cover._pdf;
  }
  return null;
}

function setRL(pct, msg) {
  rlFill.style.width   = pct + '%';
  rlDetail.textContent = msg;
}

// ─── RENDER SPREAD ───
function setPage(el, idx) {
  el.innerHTML = '';
  const src = (idx >= 0 && idx < pages.length) ? pages[idx] : null;
  if (src) {
    const img = document.createElement('img');
    img.src = src; el.appendChild(img);
  } else {
    const b = document.createElement('div');
    b.className = 'pg-blank'; el.appendChild(b);
  }
}

function renderSpread() {
  setPage(pgL, cur);
  setPage(pgR, cur + 1);

  // Display page numbers (subtract 1 for blank at [0])
  const lNum = cur === 0 ? 'Cover' : cur;
  const rIdx = cur + 1;
  const rNum = rIdx < total ? (rIdx === 1 ? 'Cover' : rIdx) : null;

  pgCounter.innerHTML = rNum !== null
    ? `<b>${lNum === 'Cover' ? 'Cover' : lNum} – ${rNum}</b> / ${total - 1}`
    : `<b>${lNum}</b> / ${total - 1}`;

  btnFirst.disabled = cur <= 0;
  btnPrev.disabled  = cur <= 0;
  btnNext.disabled  = cur + 2 >= total;
  btnLast.disabled  = cur + 2 >= total;

  syncThumbs();
}

// ─── FLIP ───
function flip(dir) {
  if (busy) return;
  if (dir > 0 && cur + 2 >= total) return;
  if (dir < 0 && cur <= 0) return;
  busy = true;

  const bookW = book.clientWidth;
  const pgW   = (bookW - 22) / 2;

  if (dir > 0) {
    fFront.innerHTML = pages[cur+1] ? `<img src="${pages[cur+1]}">` : '<div class="pg-blank"></div>';
    fBack.innerHTML  = (cur+2 < total && pages[cur+2]) ? `<img src="${pages[cur+2]}">` : '<div class="pg-blank"></div>';
    Object.assign(flipper.style, { display:'block', right:'0', left:'auto', width:pgW+'px', transformOrigin:'left center', transform:'rotateY(0deg)', transition:'none' });
  } else {
    fFront.innerHTML = (pages[cur]) ? `<img src="${pages[cur]}">` : '<div class="pg-blank"></div>';
    fBack.innerHTML  = (cur-1 >= 0 && pages[cur-1]) ? `<img src="${pages[cur-1]}">` : '<div class="pg-blank"></div>';
    Object.assign(flipper.style, { display:'block', left:'0', right:'auto', width:pgW+'px', transformOrigin:'right center', transform:'rotateY(0deg)', transition:'none' });
  }

  requestAnimationFrame(() => requestAnimationFrame(() => {
    flipper.style.transition = `transform ${FLIP}ms cubic-bezier(0.4,0,0.2,1)`;
    flipper.style.transform  = dir > 0 ? 'rotateY(-180deg)' : 'rotateY(180deg)';
  }));

  setTimeout(() => {
    cur += dir * 2;
    renderSpread();
    Object.assign(flipper.style, { display:'none', transition:'none', left:'auto', right:'0' });
    busy = false;
  }, FLIP + 40);
}

function jumpTo(idx) {
  let s = Math.floor(idx / 2) * 2;
  s = Math.max(0, Math.min(s, total - 1));
  if (s !== cur) { cur = s; renderSpread(); }
}

// ─── THUMBNAILS ───
function buildThumbs() {
  thumbList.innerHTML = '';
  pages.forEach((src, i) => {
    if (!src) return; // skip blank
    const d = document.createElement('div');
    d.className = 'thumb';
    d.innerHTML = `<img src="${src}" loading="lazy" alt="${i}">`;
    d.dataset.idx = i;
    d.addEventListener('click', () => jumpTo(i));
    thumbList.appendChild(d);
  });
}
function syncThumbs() {
  thumbList.querySelectorAll('.thumb').forEach(t => {
    const i = +t.dataset.idx;
    t.classList.toggle('active', i === cur || i === cur+1);
  });
  const a = thumbList.querySelector('.thumb.active');
  if (a) a.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

// ─── EVENTS ───
btnNext.addEventListener('click', () => flip(+1));
btnPrev.addEventListener('click', () => flip(-1));
btnFirst.addEventListener('click', () => jumpTo(0));
btnLast.addEventListener('click',  () => jumpTo(total - 1));

btnThumb.addEventListener('click', () => {
  thumbOpen = !thumbOpen;
  thumbRow.classList.toggle('show', thumbOpen);
  btnThumb.style.color = thumbOpen ? 'var(--accent2)' : '';
});

btnBack.addEventListener('click', () => {
  reader.classList.remove('show');
  catalog.classList.remove('hide');
  topTitle.classList.remove('show');
  btnBack.classList.remove('show');
  thumbRow.classList.remove('show');
  thumbOpen = false;
  pages = [];
  document.title = topBrand.textContent;
});

book.addEventListener('click', e => {
  const r = book.getBoundingClientRect();
  flip(e.clientX - r.left < r.width / 2 ? -1 : +1);
});

document.addEventListener('keydown', e => {
  if (!reader.classList.contains('show')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); flip(+1); }
  if (e.key === 'ArrowLeft')                    { e.preventDefault(); flip(-1); }
  if (e.key === 'Home') jumpTo(0);
  if (e.key === 'End')  jumpTo(total - 1);
  if (e.key === 'Escape') btnBack.click();
});

let tx = 0;
book.addEventListener('touchstart', e => { tx = e.changedTouches[0].clientX; }, { passive:true });
book.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 44) flip(dx < 0 ? +1 : -1);
});

// ─── GO ───
boot();
</script>
</body>
</html>
