name: Scan & Update Book Catalog

on:
  push:
    paths:
      - 'books/**'        # trigger saat ada PDF baru di-push
  schedule:
    - cron: '*/30 * * * *'  # scan otomatis setiap 30 menit
  workflow_dispatch:         # bisa dijalankan manual dari GitHub

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan books & update config.json
        run: python scan_books.py

      - name: Commit config.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          git diff --staged --quiet && echo "No changes." || (git commit -m "chore: auto-update book catalog [skip ci]" && git push)
