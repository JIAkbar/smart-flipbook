<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuis Formatif</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F2E9; --bg2: #FFFDF8; --bg3: #FAF7F0;
      --sage: #8FA287; --sage-d: #6B7E64; --sage-l: #B8CCB2;
      --terra: #D4A373; --terra-d: #B8855A;
      --brown: #3E362E; --brown2: #6B5D4F; --brown3: #9B8B7A; --brown4: #C5B8AD;
      --line: #DDD5C4; --border: rgba(62,54,46,.10);
      --shadow-sm: 0 2px 10px rgba(62,54,46,.09);
      --shadow-md: 0 8px 28px rgba(62,54,46,.13);
      --r: 12px; --r-sm: 8px; --r-pill: 100px;
      --topbar-h: 58px;
      --red: #c0392b; --red-l: #fdf2f0;
    }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--brown); background: var(--bg); -webkit-font-smoothing: antialiased; }

    /* ── TOPBAR ── */
    .topbar { position: sticky; top: 0; z-index: 100; height: var(--topbar-h); background: rgba(245,242,233,.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .header-inner { height: 100%; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-mark { font-size: 20px; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--brown); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-link { font-size: 12px; font-weight: 600; color: var(--brown3); text-decoration: none; padding: 4px 10px; border-radius: var(--r-pill); border: 1px solid var(--border); transition: color .2s, border-color .2s; }
    .topbar-link:hover { color: var(--terra-d); border-color: var(--terra); }

    /* ── LAYOUT ── */
    .page-wrap { max-width: 680px; margin: 0 auto; padding: 32px 24px 64px; }

    /* ── CRUMB ── */
    .crumb { display: inline-flex; align-items: center; gap: 6px; color: var(--brown3); font-size: 13px; text-decoration: none; margin-bottom: 24px; }
    .crumb:hover { color: var(--terra-d); }
    .crumb svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── HEADER ── */
    .quiz-header { margin-bottom: 28px; }
    .quiz-modul-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--terra); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: var(--r-pill); margin-bottom: 8px; }
    .quiz-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--brown); margin-bottom: 4px; }
    .quiz-sub { font-size: 13px; color: var(--brown3); }

    /* ── PROGRESS BAR ── */
    .quiz-prog { margin-bottom: 24px; }
    .quiz-prog-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--brown3); margin-bottom: 6px; }
    .quiz-prog-track { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
    .quiz-prog-fill { height: 100%; background: var(--terra); border-radius: 3px; transition: width .4s ease; }

    /* ── QUESTION CARD ── */
    .q-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 28px; margin-bottom: 20px; }
    .q-num { font-size: 11px; font-weight: 700; color: var(--brown4); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
    .q-text { font-size: 16px; font-weight: 600; line-height: 1.55; color: var(--brown); margin-bottom: 20px; }

    /* ── OPTIONS ── */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1.5px solid var(--line); border-radius: var(--r-sm); cursor: pointer; transition: border-color .15s, background .15s; background: var(--bg3); user-select: none; }
    .opt:hover { border-color: var(--terra); background: var(--bg2); }
    .opt.selected { border-color: var(--terra); background: rgba(212,163,115,.12); }
    .opt.correct  { border-color: var(--sage-d); background: rgba(143,162,135,.12); pointer-events: none; }
    .opt.wrong    { border-color: var(--red); background: var(--red-l); pointer-events: none; }
    .opt.reveal-correct { border-color: var(--sage-d); background: rgba(143,162,135,.12); pointer-events: none; }
    .opt.disabled { pointer-events: none; opacity: .6; }
    .opt-letter { width: 28px; height: 28px; border-radius: 50%; background: var(--line); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--brown2); flex-shrink: 0; transition: background .15s, color .15s; }
    .opt.selected .opt-letter { background: var(--terra); color: #fff; }
    .opt.correct  .opt-letter, .opt.reveal-correct .opt-letter { background: var(--sage-d); color: #fff; }
    .opt.wrong    .opt-letter { background: var(--red); color: #fff; }
    .opt-text { font-size: 14px; line-height: 1.45; color: var(--brown2); flex: 1; }

    /* ── FEEDBACK ── */
    .q-feedback { margin-top: 14px; padding: 10px 14px; border-radius: var(--r-sm); font-size: 13px; font-weight: 600; display: none; }
    .q-feedback.correct { background: rgba(143,162,135,.15); color: var(--sage-d); border: 1px solid rgba(107,126,100,.3); }
    .q-feedback.wrong   { background: var(--red-l); color: var(--red); border: 1px solid rgba(192,57,43,.2); }

    /* ── ACTIONS ── */
    .quiz-actions { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .btn-primary { display: inline-flex; align-items: center; gap: 7px; padding: 11px 24px; border-radius: var(--r-pill); background: var(--terra); color: #fff; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: background .15s; }
    .btn-primary:hover { background: var(--terra-d); }
    .btn-primary:disabled { opacity: .45; pointer-events: none; }
    .btn-secondary { display: inline-flex; align-items: center; gap: 7px; padding: 11px 24px; border-radius: var(--r-pill); background: transparent; color: var(--brown2); font-size: 14px; font-weight: 600; border: 1.5px solid var(--line); cursor: pointer; transition: border-color .15s; }
    .btn-secondary:hover { border-color: var(--terra); color: var(--terra-d); }

    /* ── RESULT SCREEN ── */
    #resultScreen { display: none; }
    .result-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 36px 32px; text-align: center; margin-bottom: 20px; }
    .score-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; border: 5px solid; }
    .score-circle.excellent { border-color: var(--sage-d); background: rgba(143,162,135,.1); }
    .score-circle.pass      { border-color: var(--terra);  background: rgba(212,163,115,.1); }
    .score-circle.fail      { border-color: var(--red);    background: var(--red-l); }
    .score-num  { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; }
    .score-circle.excellent .score-num { color: var(--sage-d); }
    .score-circle.pass      .score-num { color: var(--terra-d); }
    .score-circle.fail      .score-num { color: var(--red); }
    .score-sub  { font-size: 11px; font-weight: 600; color: var(--brown3); }
    .result-emoji { font-size: 36px; margin-bottom: 10px; }
    .result-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .result-msg   { font-size: 14px; color: var(--brown3); line-height: 1.6; margin-bottom: 24px; }
    .result-breakdown { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .rb-item { background: var(--bg3); border-radius: var(--r-sm); padding: 10px 18px; text-align: center; min-width: 80px; }
    .rb-val { font-size: 20px; font-weight: 700; color: var(--brown); }
    .rb-lbl { font-size: 11px; color: var(--brown3); margin-top: 2px; }
    .result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .result-actions a { text-decoration: none; }

    /* review */
    .review-section { margin-top: 8px; }
    .review-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--brown); margin-bottom: 14px; }
    .review-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 20px; margin-bottom: 10px; }
    .review-q { font-size: 14px; font-weight: 600; color: var(--brown); margin-bottom: 10px; }
    .review-opt { display: flex; align-items: flex-start; gap: 10px; padding: 7px 10px; border-radius: var(--r-sm); font-size: 13px; margin-bottom: 4px; }
    .review-opt.correct-ans { background: rgba(143,162,135,.15); color: var(--sage-d); font-weight: 600; }
    .review-opt.user-wrong  { background: var(--red-l); color: var(--red); }
    .review-opt.neutral     { color: var(--brown3); }
    .review-icon { flex-shrink: 0; font-size: 14px; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="header-inner">
    <a class="logo" href="#">
      <span class="logo-mark">✏️</span>
      <span class="logo-text">Kuis Formatif</span>
    </a>
    <div class="topbar-right">
      <a class="topbar-link" id="dashboardBack" href="index.html">← Dashboard</a>
    </div>
  </div>
</header>

<div class="page-wrap">

  <a class="crumb" id="backLink" href="dashboard-mhs.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    <span id="crumbText">Kembali</span>
  </a>

  <!-- ── QUIZ SCREEN ── -->
  <div id="quizScreen">
    <div class="quiz-header">
      <div class="quiz-modul-tag" id="quizTag">Modul —</div>
      <div class="quiz-title" id="quizTitle">Kuis Formatif</div>
      <div class="quiz-sub">5 soal pilihan ganda · Jawab dengan teliti</div>
    </div>

    <div class="quiz-prog">
      <div class="quiz-prog-info">
        <span id="progText">Soal 1 dari 5</span>
        <span id="progPct">20%</span>
      </div>
      <div class="quiz-prog-track"><div class="quiz-prog-fill" id="progBar" style="width:20%"></div></div>
    </div>

    <div class="q-card" id="qCard">
      <div class="q-num" id="qNum">Soal 1</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optList"></div>
      <div class="q-feedback" id="qFeedback"></div>
    </div>

    <div class="quiz-actions">
      <button class="btn-secondary" id="btnPrev" onclick="prevQ()" style="visibility:hidden">← Sebelumnya</button>
      <button class="btn-primary"   id="btnNext" onclick="nextQ()" disabled>Selanjutnya →</button>
    </div>
  </div>

  <!-- ── RESULT SCREEN ── -->
  <div id="resultScreen">
    <div class="result-card" id="resultCard">
      <div class="score-circle" id="scoreCircle">
        <div class="score-num" id="scoreNum">—</div>
        <div class="score-sub">Skor</div>
      </div>
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-msg"   id="resultMsg"></div>
      <div class="result-breakdown" id="breakdownRow"></div>
      <div class="result-actions" id="resultActions"></div>
    </div>

    <div class="review-section">
      <div class="review-title">📋 Pembahasan Soal</div>
      <div id="reviewList"></div>
    </div>
  </div>

</div><!-- /.page-wrap -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>

<script src="modules-data.js"></script>
<script>
/* ══ KUIS ENGINE ══ */
const params  = new URLSearchParams(location.search);
const modulId = parseInt(params.get('modul')) || 1;
const modul   = MODULES_DATA.find(m => m.id === modulId);

const LETTERS = ['A','B','C','D'];

let currentQ   = 0;
let answers    = [];     // index of selected option per question, or -1
let submitted  = [];     // true/false whether q has been answered
let correct    = [];     // correct count

function saveKuisHist(score) {
  try {
    const key  = 'sfp_kuis_' + modulId;
    const hist = JSON.parse(localStorage.getItem(key) || '[]');
    hist.push({ score, date: new Date().toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }) });
    localStorage.setItem(key, JSON.stringify(hist.slice(-10)));
  } catch(e) {}
}

if (!modul) {
  document.getElementById('qText').textContent = 'Modul tidak ditemukan.';
} else {
  const qs = modul.kuis;
  answers   = new Array(qs.length).fill(-1);
  submitted = new Array(qs.length).fill(false);

  // Header
  document.title = `Kuis Modul ${modul.id} — ${modul.title}`;
  document.getElementById('quizTag').textContent   = `Modul ${modul.id}`;
  document.getElementById('quizTitle').textContent = modul.title;
  document.getElementById('backLink').href  = `modul.html?id=${modulId}`;
  document.getElementById('crumbText').textContent = `Modul ${modulId}: ${modul.title}`;

  function renderQ(idx) {
    const q = qs[idx];
    currentQ = idx;

    // progress
    const pct = Math.round(((idx + 1) / qs.length) * 100);
    document.getElementById('progText').textContent = `Soal ${idx + 1} dari ${qs.length}`;
    document.getElementById('progPct').textContent  = pct + '%';
    document.getElementById('progBar').style.width  = pct + '%';

    document.getElementById('qNum').textContent  = `Soal ${idx + 1}`;
    document.getElementById('qText').textContent = q.q;

    // options
    const optList = document.getElementById('optList');
    optList.innerHTML = q.options.map((opt, i) => {
      let cls = 'opt';
      if (submitted[idx]) {
        if (i === q.answer)             cls += ' correct';
        else if (i === answers[idx])    cls += ' wrong';
        else                             cls += ' disabled';
      } else if (answers[idx] === i) {
        cls += ' selected';
      }
      return `<div class="${cls}" onclick="selectOpt(${i})">
        <div class="opt-letter">${LETTERS[i]}</div>
        <div class="opt-text">${opt}</div>
      </div>`;
    }).join('');

    // feedback
    const fb = document.getElementById('qFeedback');
    if (submitted[idx]) {
      const ok = answers[idx] === q.answer;
      fb.style.display = 'block';
      fb.className = 'q-feedback ' + (ok ? 'correct' : 'wrong');
      fb.textContent = ok ? '✓ Jawaban kamu benar!' : `✗ Jawaban benar: ${LETTERS[q.answer]}. ${q.options[q.answer]}`;
    } else {
      fb.style.display = 'none';
    }

    // buttons
    document.getElementById('btnPrev').style.visibility = idx > 0 ? 'visible' : 'hidden';
    const btnNext = document.getElementById('btnNext');
    if (idx === qs.length - 1) {
      btnNext.textContent = 'Lihat Hasil ✓';
      btnNext.onclick = showResult;
    } else {
      btnNext.textContent = 'Selanjutnya →';
      btnNext.onclick = nextQ;
    }
    btnNext.disabled = !submitted[idx];
  }

  function selectOpt(i) {
    if (submitted[currentQ]) return;
    answers[currentQ] = i;
    submitted[currentQ] = true;
    renderQ(currentQ);
    document.getElementById('btnNext').disabled = false;
  }
  window.selectOpt = selectOpt;

  function nextQ() { if (currentQ < qs.length - 1) renderQ(currentQ + 1); }
  function prevQ() { if (currentQ > 0) renderQ(currentQ - 1); }
  window.nextQ = nextQ;
  window.prevQ = prevQ;

  function showResult() {
    const total   = qs.length;
    const benar   = qs.filter((q, i) => answers[i] === q.answer).length;
    const score   = Math.round((benar / total) * 100);

    saveKuisHist(score);

    document.getElementById('quizScreen').style.display   = 'none';
    document.getElementById('resultScreen').style.display = 'block';

    // circle
    const circle = document.getElementById('scoreCircle');
    circle.className = 'score-circle ' + (score >= 80 ? 'excellent' : score >= 60 ? 'pass' : 'fail');
    document.getElementById('scoreNum').textContent = score + '%';

    // verdict
    let emoji, title, msg;
    if (score >= 80) {
      emoji = '🌟'; title = 'Sangat Baik!';
      msg = `Selamat! Kamu mendapatkan skor ${score}%. Pemahaman kamu terhadap materi modul ini sangat baik.`;
    } else if (score >= 60) {
      emoji = '👍'; title = 'Lulus!';
      msg = `Kamu mendapatkan skor ${score}%. Kamu telah memenuhi batas kelulusan. Tingkatkan lagi untuk hasil lebih baik!`;
    } else {
      emoji = '📚'; title = 'Perlu Mengulang';
      msg = `Skor kamu ${score}% — di bawah batas kelulusan 60%. Disarankan untuk membaca kembali modul dan mencoba kuis ulang.`;
    }
    document.getElementById('resultEmoji').textContent = emoji;
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultMsg').textContent   = msg;

    // breakdown
    document.getElementById('breakdownRow').innerHTML = `
      <div class="rb-item"><div class="rb-val" style="color:var(--sage-d)">${benar}</div><div class="rb-lbl">Benar</div></div>
      <div class="rb-item"><div class="rb-val" style="color:var(--red)">${total - benar}</div><div class="rb-lbl">Salah</div></div>
      <div class="rb-item"><div class="rb-val">${total}</div><div class="rb-lbl">Total soal</div></div>`;

    // actions
    const retryBtn = `<button class="btn-secondary" onclick="retryKuis()">🔄 Coba Lagi</button>`;
    const backBtn  = `<a class="btn-primary" href="modul.html?id=${modulId}">← Kembali ke Modul</a>`;
    document.getElementById('resultActions').innerHTML = retryBtn + backBtn;

    // review
    const reviewHTML = qs.map((q, i) => {
      const userAns = answers[i];
      const isOk    = userAns === q.answer;
      return `<div class="review-item">
        <div class="review-q">${i + 1}. ${q.q}</div>
        ${q.options.map((opt, j) => {
          let cls = 'neutral', icon = '·';
          if (j === q.answer)    { cls = 'correct-ans'; icon = '✓'; }
          if (j === userAns && !isOk) { cls = 'user-wrong';  icon = '✗'; }
          return `<div class="review-opt ${cls}"><span class="review-icon">${icon}</span> ${LETTERS[j]}. ${opt}</div>`;
        }).join('')}
      </div>`;
    }).join('');
    document.getElementById('reviewList').innerHTML = reviewHTML;
  }
  window.showResult = showResult;

  function retryKuis() {
    answers   = new Array(qs.length).fill(-1);
    submitted = new Array(qs.length).fill(false);
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display   = 'block';
    renderQ(0);
  }
  window.retryKuis = retryKuis;

  // Start
  renderQ(0);
}
</script>
</body>
</html>
