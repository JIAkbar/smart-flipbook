<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perpustakaan Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar" id="topbar">
  <div class="header-inner">
    <a class="logo" href="#">
      <span class="logo-mark">📖</span>
      <span class="logo-text" id="siteName">Perpustakaan Digital</span>
    </a>
    <div class="topbar-right">
      <button class="topbar-cat-btn" id="topbarCatBtn" onclick="toggleCatalog()" title="Buka/tutup katalog">📚 Katalog</button>
      <a class="topbar-link" id="dashboardBack" href="index.html" title="Kembali ke Dashboard">← Dashboard</a>
      <a class="topbar-link" href="changelog.html" title="Changelog">📋 Changelog</a>
      <a class="topbar-link" href="checklist.html" title="Checklist">✅ Checklist</a>
    </div>
  </div>
</header>

<div class="app" id="app">

  <!-- ═══ CATALOG DRAWER (overlay, CSS-only toggle) ═══ -->
  <div class="cat-backdrop" id="catBackdrop" onclick="closeCatalog()"></div>
  <aside class="cat-pane" id="catPane">
    <div class="cp-head">
      <h2>Katalog Buku</h2>
      <p class="cp-sub" id="catSub">Memuat…</p>
      <button class="cp-close-btn" onclick="closeCatalog()" title="Tutup katalog">×</button>
    </div>
    <div class="cp-loading" id="cpLoading">
      <div class="cp-ring"></div>
    </div>
    <div class="cp-error" id="cpError">
      <div class="cp-err-icon">⚠️</div>
      <p>Gagal memuat katalog</p>
      <p class="cp-hint" id="stateHint"></p>
    </div>
    <div class="cp-grid" id="bookGrid"></div>
    <div class="cp-footer">
      <button class="btn-lanjut" id="btnLanjut" onclick="startReading()">‹ Mulai Baca</button>
    </div>
  </aside>

  <!-- ═══ FLIP PANE (full width) ═══ -->
  <section class="flip-pane" id="flipPane">

    <!-- Welcome screen (shown before any book is opened) -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">📚</div>
      <h2>Pilih buku dari katalog</h2>
      <p>Klik judul buku apa saja untuk mulai membaca</p>
    </div>

    <!-- Loading progress -->
    <div class="fl-loader" id="flLoader">
      <div class="fl-title" id="flTitle"></div>
      <div class="fl-spinner-wrap">
        <div class="fl-ring"></div>
      </div>
      <div class="fl-bar-wrap">
        <div class="fl-bar"><div class="fl-fill" id="flFill"></div></div>
        <span class="fl-detail" id="flDetail">Mempersiapkan…</span>
      </div>
    </div>

    <!-- Book stage -->
    <div class="stage" id="stage">
      <div class="zoom-outer" id="zoomOuter">
        <div class="book-wrap">
          <div class="book" id="book">
            <div class="pg pg-l" id="pgL"></div>
            <div class="spine"></div>
            <div class="pg pg-r" id="pgR"></div>
            <div class="flipper" id="flipper">
              <div class="f-face f-front" id="fFront"></div>
              <div class="f-face f-back" id="fBack"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <button class="tb-btn" id="btnFirst" title="Halaman pertama">⏮</button>
      <button class="tb-btn" id="btnPrev"  title="Sebelumnya">‹</button>
      <span   class="pg-counter" id="pgCounter">— / —</span>
      <button class="tb-btn" id="btnNext"  title="Berikutnya">›</button>
      <button class="tb-btn" id="btnLast"  title="Halaman terakhir">⏭</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btnThumb" title="Thumbnail strip">⊞</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btnZoomOut" title="Perkecil (−)">−</button>
      <span   class="zoom-label" id="zoomLabel">100%</span>
      <button class="tb-btn" id="btnZoomIn"  title="Perbesar (+)">+</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btnExpand" title="Perluas / Ciutkan">⤢</button>
      <div class="bg-chip" id="bgProgress"><span id="bgText">Memuat latar…</span></div>
    </div>

    <!-- Mobile back button -->
    <button class="mobile-back" id="mobileBack">← Katalog</button>

  </section>


</div><!-- /.app -->

<!-- Thumbnail strip -->
<div id="thumbRow"><div class="thumblist" id="thumbList"></div></div>

<!-- Zoom hint -->
<div class="zoom-hint" id="zoomHint">Scroll untuk zoom · Drag untuk geser</div>

<!-- Supabase (untuk cek role → arah tombol dashboard) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script>
(async function() {
  const back = document.getElementById('dashboardBack');
  try {
    if (typeof sb !== 'undefined') {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const { data: p } = await sb.from('profiles').select('role').eq('id', session.user.id).single();
        back.href = (p && p.role === 'dosen') ? 'dashboard-dos.html' : 'dashboard-mhs.html';
        return;
      }
    }
  } catch(e) {}
  // Demo / tidak login → ke halaman utama
  back.href = 'index.html';
})();
</script>
<style>
/* ── CATALOG DRAWER (overlay approach, no grid manipulation) ── */
.cat-backdrop { display:none!important; }
@keyframes pgSpin { to { transform:rotate(360deg); } }

.cat-pane {
  position:fixed!important;
  top:var(--topbar-h,58px);left:0;right:0;bottom:0;
  width:100%!important;
  z-index:190;
  transform:translateY(-100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  box-shadow:0 8px 32px rgba(62,54,46,.18);
  overflow-y:auto;
}
.cat-pane.open { transform:translateY(0); }

/* grid buku lebih lebar ketika full-screen */
.cat-pane.open .cp-grid {
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  max-width:900px;margin:0 auto;
}

/* flip-pane fills full width now (no grid column sharing) */
.app { display:block!important; }
.flip-pane { width:100%!important; height:calc(100vh - var(--topbar-h,58px))!important; }

/* thumbnail strip: mulai dari kiri (bukan offset catalog 320px) */
#thumbRow { left:0!important; }

/* expanded mode tidak relevan lagi — sembunyikan btnExpand */
#btnExpand { display:none!important; }

/* close button di cp-head */
.cp-head { position:relative; }
.cp-close-btn {
  position:absolute;top:50%;right:12px;transform:translateY(-50%);
  width:28px;height:28px;border-radius:50%;
  border:1px solid var(--border,rgba(62,54,46,.15));
  background:var(--bg3,#FAF7F0);cursor:pointer;
  font-size:16px;font-weight:700;color:var(--brown2,#6B5D4F);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.cp-close-btn:hover{background:var(--terra,#D4A373);color:#fff;}

/* footer mulai baca — sticky di bawah */
.cp-footer {
  position:sticky;bottom:0;
  background:var(--bg2,#FFFDF8);
  border-top:1px solid var(--border,rgba(62,54,46,.1));
  padding:12px 24px;
  display:flex;justify-content:center;
}
.btn-lanjut {
  width:100%;max-width:400px;
  padding:13px 0;border-radius:100px;
  background:var(--terra,#D4A373);color:#fff;
  font-size:15px;font-weight:700;border:none;cursor:pointer;
  transition:background .15s;font-family:inherit;
}
.btn-lanjut:hover{background:var(--terra-dark,#B8855A);}

/* cp-head: tampilkan judul di tengah dengan close di kanan */
.cp-head {
  padding:18px 24px 14px;
  border-bottom:1px solid var(--border,rgba(62,54,46,.1));
  text-align:center;
}
.cp-head h2 { font-size:1.3rem; }

/* topbar catalog toggle button */
.topbar-cat-btn {
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:100px;
  border:1px solid var(--border,rgba(62,54,46,.15));
  background:var(--terra,#D4A373);color:#fff;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:background .15s;
  font-family:inherit;
}
.topbar-cat-btn:hover{background:var(--terra-dark,#B8855A);}
</style>
<!-- pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<script>
function openCatalog() {
  document.getElementById('catPane').classList.add('open');
  document.getElementById('catBackdrop').classList.add('visible');
}
function closeCatalog() {
  document.getElementById('catPane').classList.remove('open');
  document.getElementById('catBackdrop').classList.remove('visible');
  if (typeof buildBook === 'function') setTimeout(buildBook, 60);
}
function toggleCatalog() {
  const open = document.getElementById('catPane').classList.contains('open');
  open ? closeCatalog() : openCatalog();
}
function startReading() {
  const sel = document.getElementById('btnLanjut')._selectedBook;
  closeCatalog();
  if (!sel) return;
  // Paksa buka dari halaman 1 (clear currentPath agar openBook tidak skip)
  if (typeof openBook === 'function') {
    window._sfpCurrentPath = null; // sinyal ke script.js
    openBook(sel.path, sel.title);
  }
}
// Buka katalog saat load (user perlu pilih buku)
openCatalog();
</script>
<script src="script.js"></script>
</body>
</html>
